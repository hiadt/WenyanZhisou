llm:
  provider: openai_compatible
  base_url: "http://127.0.0.1:8000/v1"
  api_key: "${OPENAI_API_KEY}"
  model: "Qwen/Qwen2.5-7B-Instruct"
  temperature: 0.2
  max_tokens: 1500
  timeout: 60

small_models:
  embedding_model: "BAAI/bge-small-en-v1.5"
  reranker_model: "BAAI/bge-reranker-base"
  device: "auto"
  embedding_batch_size: 64
  reranker_batch_size: 16

retrieval:
  use_openalex: true
  use_semantic_scholar: true
  use_arxiv: true
  # Optional PaSa-style Google/Serper crawler for arXiv pages.
  # It is skipped automatically when SERPER_API_KEY is empty.
  use_serper: true
  openalex_mailto: ""
  semantic_scholar_api_key: "${SEMANTIC_SCHOLAR_API_KEY}"
  serper_api_key: "${SERPER_API_KEY}"
  serper_top_k: 8
  serper_arxiv_limit: 10
  serper_query_limit: 1
  serper_query_variants: 1
  arxiv_query_limit: 1
  arxiv_query_variants: 1
  academic_only: true
  # Optional PaSa local arXiv title database. It is used only if the file exists.
  pasa_id2paper_path: "data/pasa-dataset/paper_database/id2paper.json"
  pasa_title_limit: 260
  pasa_title_min_score: 0.07
  per_query: 38
  max_candidates: 260
  min_candidate_pool_size: 150
  enable_adaptive_second_pass: true
  api_timeout_seconds: 6
  citation_expand_seeds: 0
  citation_expand_limit: 0
  max_rounds: 1
  # Optional local JSONL corpus for offline smoke tests or private corpus retrieval.
  local_corpus_path: ""
  # Minimum local-corpus match score. Use >0 for tiny smoke corpora to avoid
  # returning unrelated demo papers for out-of-domain queries.
  local_min_score: 0.0
  # Parallel online API requests and per-process cache reduce benchmark latency.
  api_parallelism: 6
  enable_api_cache: true

ranking:
  api_weight: 0.10
  bm25_weight: 0.15
  embedding_weight: 0.25
  reranker_weight: 0.25
  llm_verifier_weight: 0.15
  authority_weight: 0.06
  recency_weight: 0.03
  diversity_weight: 0.00
  llm_verify_top_n: 30
  llm_verifier_batch_size: 15
  use_rrf: true
  rrf_k: 60
  rerank_candidate_limit: 120

budget:
  max_llm_calls_per_query: 3
  max_api_calls_per_query: 16
  max_latency_seconds: 70
