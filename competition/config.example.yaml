llm:
  provider: openai_compatible
  base_url: "http://127.0.0.1:8000/v1"
  api_key: "${OPENAI_API_KEY}"
  model: "Qwen/Qwen2.5-7B-Instruct"
  temperature: 0.2
  max_tokens: 1500
  timeout: 60

small_models:
  embedding_model: "BAAI/bge-small-en-v1.5"
  reranker_model: "BAAI/bge-reranker-base"
  device: "auto"
  embedding_batch_size: 64
  reranker_batch_size: 16

retrieval:
  use_openalex: true
  use_semantic_scholar: true
  use_arxiv: true
  # Optional PaSa-style Google/Serper crawler for arXiv pages.
  # It is skipped automatically when SERPER_API_KEY is empty.
  use_serper: true
  openalex_mailto: ""
  semantic_scholar_api_key: "${SEMANTIC_SCHOLAR_API_KEY}"
  serper_api_key: "${SERPER_API_KEY}"
  serper_top_k: 10
  serper_arxiv_limit: 12
  serper_query_limit: 1
  serper_query_variants: 1
  arxiv_query_limit: 1
  arxiv_query_variants: 1
  academic_only: true
  # Optional neutral public academic index. It can be JSONL metadata or
  # a compact arXiv-id-to-title JSON map. If absent, the code can fall back to
  # the PaSa public paper database for reproducible public benchmark runs.
  general_index_path: ""
  general_index_limit: 350
  general_index_min_score: 0.06
  local_bm25_top_k: 200
  local_dense_top_k: 200
  general_index_fallback_pasa: true
  # Backward-compatible PaSa public arXiv title database.
  pasa_id2paper_path: "data/pasa-dataset/paper_database/id2paper.json"
  pasa_title_limit: 0
  pasa_title_min_score: 0.07
  per_query: 45
  max_candidates: 360
  min_candidate_pool_size: 200
  enable_adaptive_second_pass: true
  api_timeout_seconds: 6
  citation_expand_seeds: 2
  citation_expand_limit: 8
  max_rounds: 1
  # Optional local JSONL corpus for offline smoke tests or private corpus retrieval.
  local_corpus_path: ""
  # Minimum local-corpus match score. Use >0 for tiny smoke corpora to avoid
  # returning unrelated demo papers for out-of-domain queries.
  local_min_score: 0.0
  # Parallel online API requests and per-process cache reduce benchmark latency.
  api_parallelism: 6
  enable_api_cache: true

ranking:
  api_weight: 0.10
  bm25_weight: 0.15
  embedding_weight: 0.25
  reranker_weight: 0.25
  llm_verifier_weight: 0.15
  authority_weight: 0.06
  recency_weight: 0.03
  diversity_weight: 0.00
  llm_verify_top_n: 40
  llm_verifier_batch_size: 20
  use_rrf: true
  rrf_k: 60
  rerank_candidate_limit: 150
  meta_ranker_enabled: true
  meta_ranker_weight: 0.45
  rrf_fusion_weight: 0.30
  neural_fusion_weight: 0.15
  llm_fusion_weight: 0.10
  meta_ranker_weights_path: ""

budget:
  max_llm_calls_per_query: 3
  max_api_calls_per_query: 18
  max_latency_seconds: 90
