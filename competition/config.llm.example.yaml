llm:
  # Any OpenAI-compatible chat-completions endpoint can be used here:
  # DeepSeek, Qwen via DashScope/Bailian, SiliconFlow, vLLM, Ollama, etc.
  provider: openai_compatible
  base_url: "https://api.deepseek.com/v1"
  api_key: "${DEEPSEEK_API_KEY}"
  model: "deepseek-chat"
  temperature: 0.2
  max_tokens: 1500
  timeout: 60

small_models:
  # Use real models for formal runs. If the current machine has no GPU or
  # cannot download weights, start the app with --fallback_models first.
  embedding_model: "BAAI/bge-small-en-v1.5"
  reranker_model: "BAAI/bge-reranker-base"
  device: "auto"
  embedding_batch_size: 64
  reranker_batch_size: 16

retrieval:
  use_openalex: true
  use_semantic_scholar: true
  use_arxiv: true
  use_serper: true
  openalex_mailto: ""
  semantic_scholar_api_key: "${SEMANTIC_SCHOLAR_API_KEY}"
  serper_api_key: "${SERPER_API_KEY}"
  serper_top_k: 10
  serper_arxiv_limit: 12
  serper_query_limit: 1
  serper_query_variants: 1
  arxiv_query_limit: 1
  arxiv_query_variants: 1
  academic_only: true
  general_index_path: ""
  general_index_limit: 350
  general_index_min_score: 0.06
  local_bm25_top_k: 200
  local_dense_top_k: 200
  general_index_fallback_pasa: true
  pasa_id2paper_path: "data/pasa-dataset/paper_database/id2paper.json"
  pasa_title_limit: 0
  pasa_title_min_score: 0.07
  local_corpus_path: ""
  local_min_score: 0.0
  per_query: 45
  max_candidates: 360
  min_candidate_pool_size: 200
  enable_adaptive_second_pass: true
  citation_expand_seeds: 2
  citation_expand_limit: 8
  max_rounds: 1
  api_parallelism: 6
  enable_api_cache: true

ranking:
  api_weight: 0.10
  bm25_weight: 0.15
  embedding_weight: 0.25
  reranker_weight: 0.25
  llm_verifier_weight: 0.08
  authority_weight: 0.03
  recency_weight: 0.02
  diversity_weight: 0.00
  llm_verify_top_n: 40
  llm_verifier_batch_size: 20
  use_rrf: true
  rrf_k: 60
  rerank_candidate_limit: 150
  meta_ranker_enabled: true
  meta_ranker_weight: 0.45
  rrf_fusion_weight: 0.30
  neural_fusion_weight: 0.15
  llm_fusion_weight: 0.10
  meta_ranker_weights_path: ""

budget:
  max_llm_calls_per_query: 3
  max_api_calls_per_query: 18
  max_latency_seconds: 90
